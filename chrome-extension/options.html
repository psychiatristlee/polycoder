<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Polymath — Settings</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 14px/1.6 -apple-system, system-ui, sans-serif; max-width: 560px; margin: 32px auto; padding: 0 16px; }
      h1 { color: #a855f7; margin-bottom: 4px; }
      label { display: block; font-weight: 600; margin-top: 16px; }
      input, select { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; font: inherit; }
      button { margin-top: 16px; padding: 8px 16px; background: #a855f7; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font: inherit; }
      .hint { color: #888; font-size: 13px; }
      a { color: #a855f7; }
      #status { margin-top: 14px; min-height: 20px; }
      .ok { color: #16a34a; } .err { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>Polymath</h1>
    <p class="hint">
      Polymath reaches 300+ models through one OpenRouter key. Create a key at
      <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>
      (free to sign up). Stored locally in this browser only.
    </p>

    <label for="key">OpenRouter API key</label>
    <input id="key" type="password" placeholder="sk-or-..." autocomplete="off" />

    <label for="objective">Default routing objective</label>
    <select id="objective">
      <option value="cheapest">cheapest — minimize cost</option>
      <option value="value">value — best strength per dollar</option>
      <option value="quality">quality — strongest per task</option>
    </select>

    <button id="save">Validate &amp; Save</button>
    <div id="status"></div>

    <script type="module" src="dist/options.js"></script>
  </body>
</html>
