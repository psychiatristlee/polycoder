<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>polyrun</title>
<style>
  :root{
    /* Burgundy · Paris-style palette */
    --bg:#f7f2ea; --panel:#efe7da; --panel2:#e9dfcd; --bubble:#efe6d5;
    --card:#fffdf8; --fg:#2a211e; --mut:#8a7d6e; --soft:#b6a892;
    --accent:#6e2436; --accent2:#531826; --gold:#a9863f;
    --border:#e3d7c3; --border2:#d8cab2; --code:#efe6d3;
    --green:#4a6b4d; --blue:#5e6b88;
    --shadow:0 1px 2px rgba(70,45,30,.05), 0 8px 28px rgba(70,45,30,.07);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:15px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#dccfb8;border-radius:10px;border:2px solid transparent;background-clip:content-box}
  button{font:inherit;cursor:pointer}
  @keyframes sp{to{transform:rotate(360deg)}}
  .spin{display:inline-block;width:15px;height:15px;border:2.5px solid #ddd0bb;border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;vertical-align:-3px}

  /* sidebar */
  .side{width:256px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px 14px}
  .brand{font-family:Georgia,"Times New Roman",serif;font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--accent);margin:2px 8px 4px;display:flex;align-items:center;gap:9px}
  .brand .mk{width:11px;height:11px;border-radius:3px;background:var(--gold);transform:rotate(45deg);display:inline-block}
  .tagline{font-size:11px;color:var(--soft);margin:0 8px 16px;letter-spacing:.2px}
  .sbtn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--fg);padding:9px 11px;border-radius:10px;font-size:13.5px;transition:background .12s}
  .sbtn:hover{background:var(--panel2)}
  .sbtn .ic{font-size:15px;width:18px;text-align:center}
  .folder{font-size:11.5px;color:var(--mut);padding:7px 11px 4px;word-break:break-all;line-height:1.4}
  .seclabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--soft);margin:16px 9px 5px;font-weight:600}
  .files{overflow:auto;flex:1;margin-top:1px}
  .file{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#5e594d;padding:4px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;overflow:hidden}
  .file:hover{background:var(--panel2)}
  .file .fi{font-size:12px;width:15px;text-align:center;flex-shrink:0;opacity:.85}
  .file .fn{overflow:hidden;text-overflow:ellipsis}
  .file.dir{color:var(--accent);cursor:default}.file.dir:hover{background:transparent}
  .foot{border-top:1px solid var(--border);padding-top:12px;margin-top:8px}
  .foot input{width:100%;margin-bottom:8px;padding:9px 11px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--fg);font:inherit;font-size:13px;outline:none}
  .foot input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,36,54,.08)}
  .foot .savekey{justify-content:center;background:var(--panel2);border-color:var(--border2)}
  .chips{margin-top:9px}
  .chip{display:inline-block;font-size:10.5px;color:var(--mut);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:2px 9px;margin:0 4px 4px 0}

  /* chat */
  .main{flex:1;display:flex;min-width:0}
  .chatpane{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:52px;display:flex;align-items:center;gap:10px;padding:0 24px;border-bottom:1px solid var(--border);color:var(--fg);font-size:14px;font-weight:600}
  .topbar .sub{color:var(--soft);font-weight:400;font-size:12px}
  #chat{flex:1;overflow:auto;padding:28px 0}
  .col{max-width:720px;margin:0 auto;padding:0 28px}
  .msg{margin:20px auto;max-width:720px;padding:0 28px;display:flex;gap:13px}
  .msg .av{width:27px;height:27px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font:600 13px Georgia,serif;margin-top:2px;background:var(--accent);color:#fff}
  .msg .body{flex:1;min-width:0;padding-top:2px}
  .msg.user{justify-content:flex-end}
  .msg.user .bubble{background:var(--bubble);border:1px solid var(--border);padding:11px 16px;border-radius:17px 17px 6px 17px;max-width:80%;white-space:pre-wrap;box-shadow:var(--shadow)}
  .msg.assistant .body p{margin:0 0 9px;white-space:pre-wrap}
  .status{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:8px;margin:4px 0}
  .status .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
  .tool{font:12px/1.5 ui-monospace,Menlo,monospace;color:#6a6258;background:var(--code);border:1px solid var(--border);border-radius:9px;padding:7px 11px;margin:5px 0;white-space:pre-wrap;word-break:break-word}
  .qbox{margin:9px 0;background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:14px 16px}
  .qq{font-weight:600;color:var(--accent2);margin-bottom:10px}
  .qopts{display:flex;flex-direction:column;gap:7px}
  .qopt{text-align:left;background:var(--card);border:1px solid var(--border2);color:var(--fg);padding:10px 14px;border-radius:11px;font-size:13.5px;transition:all .12s}
  .qopt:hover{border-color:var(--accent);background:#fff}
  .qopt.sel{border-color:var(--accent);background:var(--bubble);font-weight:600}
  .qopt:disabled{opacity:.55;cursor:default}
  .ok{color:var(--green)} .info{color:var(--blue)} .err{color:var(--accent2)} .step{color:var(--accent2);font-weight:600}
  .hello{text-align:center;margin-top:15vh;color:var(--mut)}
  .hello h1{font-family:Georgia,serif;font-weight:600;color:var(--fg);font-size:31px;margin:0 0 8px;letter-spacing:-.4px}

  /* composer */
  .composer{padding:14px 28px 24px}
  .cwrap{max-width:720px;margin:0 auto;background:var(--card);border:1px solid var(--border2);border-radius:20px;box-shadow:var(--shadow);display:flex;align-items:flex-end;gap:8px;padding:8px 8px 8px 18px;transition:border-color .12s,box-shadow .12s}
  .cwrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,36,54,.08),var(--shadow)}
  .cwrap textarea{flex:1;border:0;outline:none;resize:none;font:inherit;background:transparent;color:var(--fg);max-height:170px;padding:9px 0;line-height:1.5}
  .send{width:38px;height:38px;border-radius:12px;border:0;background:var(--accent);color:#fff;font-size:17px;flex-shrink:0;transition:background .12s}
  .send:hover{background:var(--accent2)} .send:disabled{background:#cdbfa9}
  .hint{max-width:720px;margin:8px auto 0;font-size:11px;color:var(--soft);text-align:center}

  /* artifact preview */
  .preview{width:48%;min-width:380px;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column}
  .preview[hidden]{display:none}
  .pvhead{height:52px;display:flex;align-items:center;gap:9px;padding:0 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--mut);background:var(--bg)}
  .pvhead .pvic{color:var(--accent)} .pvhead .pvname{flex:1;color:var(--fg);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pvhead button{background:transparent;border:0;color:var(--mut);font-size:16px;border-radius:7px;padding:4px 8px}.pvhead button:hover{background:var(--panel2)}
  .pvbody{flex:1;overflow:auto;background:var(--card)}
  .pvbody iframe{width:100%;height:100%;border:0;background:#fff}
  .pvload{display:flex;align-items:center;justify-content:center;gap:10px;height:100%;color:var(--mut)}
  .pvbody .md{padding:28px 34px;color:#2a2320;max-width:780px;line-height:1.75}
  .pvbody .md h1{font-size:27px}.pvbody .md h2{font-size:21px}.pvbody .md h3{font-size:17px}
  .pvbody .md h1,.pvbody .md h2,.pvbody .md h3{font-family:Georgia,serif;color:var(--accent2);margin:1.3em 0 .45em;line-height:1.3}
  .pvbody .md pre{background:var(--code);padding:13px 15px;border-radius:9px;overflow:auto;border:1px solid var(--border)}
  .pvbody .md code{background:var(--code);padding:1px 6px;border-radius:5px;font-family:ui-monospace,Menlo,monospace;font-size:13px}
  .pvbody .md pre code{background:none;padding:0}
  .pvbody .md blockquote{border-left:3px solid var(--accent);padding:3px 0 3px 14px;color:#6a6258;margin:1em 0}
  .pvbody table.grid{border-collapse:collapse;margin:0;font-size:13.5px;width:100%}
  .pvbody table.grid td,.pvbody table.grid th{border:1px solid var(--border);padding:7px 13px;text-align:left}
  .pvbody table.grid th,.pvbody table.grid tr:first-child td{background:var(--code);color:var(--accent2);font-weight:600}
  .pvbody .md table{border-collapse:collapse;margin:.6em 0}.pvbody .md td,.pvbody .md th{border:1px solid var(--border);padding:6px 12px}.pvbody .md th{background:var(--code);color:var(--accent2)}
  .pvbody .gridwrap{padding:22px 24px}
  .pvbody .gridwrap .sheetname{font-family:Georgia,serif;color:var(--accent2);font-weight:600;margin:0 0 10px}
  .pvbody .svgwrap{padding:26px;display:flex;justify-content:center;align-items:flex-start;min-height:100%}
  .pvbody .svgwrap svg{max-width:100%;height:auto}
  .pvbody img.pv{max-width:100%;display:block;margin:0 auto;padding:22px}
  .pvbody pre.raw{margin:0;padding:24px;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:#3a342d;line-height:1.6}
  .katex{font-size:1.05em}
</style>
<link rel="stylesheet" href="node_modules/katex/dist/katex.min.css">
<script defer src="node_modules/katex/dist/katex.min.js"></script>
<script defer src="node_modules/katex/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <aside class="side">
    <div class="brand"><span class="mk"></span>polyrun</div>
    <div class="tagline">poly 기반 데스크톱 에이전트</div>
    <button class="sbtn" id="pick"><span class="ic">📂</span> 작업 폴더 열기</button>
    <button class="sbtn" id="local"><span class="ic">⬇</span> 로컬 LLM 설치</button>
    <div class="folder" id="folder">폴더 미선택</div>
    <div class="seclabel">파일</div>
    <div class="files" id="files"><div class="file" style="cursor:default">폴더를 선택하세요</div></div>
    <div class="foot">
      <input type="password" id="key" placeholder="🔑 OpenRouter 키 (선택)" />
      <button class="sbtn savekey" id="savekey">키 저장</button>
      <div class="chips"><span class="chip" id="keystat">key ?</span><span class="chip" id="localstat">local ?</span><span class="chip">engine · poly</span></div>
    </div>
  </aside>

  <main class="main">
   <div class="chatpane">
    <div class="topbar"><span id="title">새 대화</span> <span class="sub" id="subtitle"></span></div>
    <div id="chat">
      <div class="hello" id="hello">
        <h1>무엇을 만들어 드릴까요?</h1>
        <div>작업 폴더를 열고, 문서·코드·엑셀·시각화 작업을 자연어로 요청하세요.</div>
      </div>
    </div>
    <div class="composer">
      <div class="cwrap">
        <textarea id="goal" rows="1" placeholder="polyrun에게 메시지 보내기…  (예: 매출 차트를 SVG로 그려줘)"></textarea>
        <button class="send" id="run" title="보내기">↑</button>
      </div>
      <div class="hint">poly 에이전트가 작업 폴더에서 파일을 읽고 쓰고 명령을 실행합니다 · Shift+Enter 줄바꿈</div>
    </div>
   </div>
   <div class="preview" id="preview" hidden>
     <div class="pvhead"><span class="pvic" id="pvic">◆</span><span class="pvname" id="pvname"></span><button id="pvclose" title="닫기">✕</button></div>
     <div class="pvbody" id="pvbody"></div>
   </div>
  </main>

<script>
const $=(id)=>document.getElementById(id);
let cwd=null, shotPath="", running=false, cur=null, curP=null, spinnerRow=null;
const chat=$("chat");
function hideHello(){ const h=$("hello"); if(h) h.remove(); }
function scroll(){ chat.scrollTop=chat.scrollHeight; }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function userMsg(text){ hideHello(); const m=document.createElement("div"); m.className="msg user"; m.innerHTML='<div class="bubble"></div>'; m.querySelector(".bubble").textContent=text; chat.appendChild(m); scroll(); }
function assistantStart(){ hideHello(); const m=document.createElement("div"); m.className="msg assistant"; m.innerHTML='<div class="av">P</div><div class="body"></div>'; chat.appendChild(m); cur=m.querySelector(".body"); curP=null; scroll(); }
function status(text,cls){ if(!cur) assistantStart(); const d=document.createElement("div"); d.className="status "+(cls||""); const dot=document.createElement("span"); dot.className="dot"; const s=document.createElement("span"); s.className=cls||""; s.textContent=text; d.appendChild(dot); d.appendChild(s); cur.appendChild(d); curP=null; scroll(); return d; }
function tool(text){ if(!cur) assistantStart(); const d=document.createElement("div"); d.className="tool"; d.textContent=text; cur.appendChild(d); curP=null; scroll(); }
function delta(t){ if(!cur) assistantStart(); if(!curP){ curP=document.createElement("p"); cur.appendChild(curP);} curP.textContent+=t; scroll(); }
function busyOn(label){ if(!cur) assistantStart(); spinnerRow=document.createElement("div"); spinnerRow.className="status"; spinnerRow.innerHTML='<span class="spin"></span>'; const s=document.createElement("span"); s.textContent=label||"작업 중…"; spinnerRow.appendChild(s); cur.appendChild(spinnerRow); scroll(); }
function busyOff(){ if(spinnerRow){ spinnerRow.remove(); spinnerRow=null; } }
function renderQuestion(q,options){ if(!cur) assistantStart(); busyOff();
  const wrap=document.createElement("div"); wrap.className="qbox";
  const t=document.createElement("div"); t.className="qq"; t.textContent="❓ "+q; wrap.appendChild(t);
  const ob=document.createElement("div"); ob.className="qopts";
  (options||[]).forEach(o=>{ const b=document.createElement("button"); b.className="qopt"; b.textContent=o;
    b.onclick=()=>{ window.poly.answer(o); ob.querySelectorAll("button").forEach(x=>x.disabled=true); b.classList.add("sel"); status("선택: "+o,"ok"); busyOn("계속 진행 중…"); };
    ob.appendChild(b); });
  wrap.appendChild(ob); cur.appendChild(wrap); scroll();
}

async function refreshStatus(){ const s=await window.poly.status(); $("keystat").textContent="key "+(s.hasKey?"✓":"✗"); $("localstat").textContent="local "+(s.local?"✓":"✗"); }
const ICONS={md:"📝",markdown:"📝",html:"🌐",htm:"🌐",svg:"◆",pdf:"📕",tex:"📐",csv:"📊",xlsx:"📊",xls:"📊",json:"⚙",png:"🖼",jpg:"🖼",jpeg:"🖼",gif:"🖼",webp:"🖼"};
const RENDERABLE=new Set(["md","markdown","html","htm","svg","pdf","tex","csv","json","xlsx","xls","png","jpg","jpeg","gif","webp"]);
let knownFiles=null;
function iconFor(name){ if(name.endsWith("/")) return "📁"; return ICONS[(name.split(".").pop()||"").toLowerCase()]||"📄"; }
async function refreshFiles(){ if(!cwd) return; const files=await window.poly.listFiles(cwd);
  // Claude-style: when the agent creates a new renderable artifact, auto-open it.
  if(knownFiles){ const fresh=files.filter(f=>!f.endsWith("/")&&!knownFiles.has(f)&&RENDERABLE.has((f.split(".").pop()||"").toLowerCase())); if(fresh.length) openPreview(cwd.replace(/\/$/,"")+"/"+fresh[fresh.length-1]); }
  knownFiles=new Set(files);
  const box=$("files"); box.innerHTML=""; if(!files.length){box.innerHTML='<div class="file" style="cursor:default">(빈 폴더)</div>';return;} for(const f of files){const d=document.createElement("div");d.className="file"+(f.endsWith("/")?" dir":"");d.innerHTML='<span class="fi">'+iconFor(f)+'</span><span class="fn"></span>';d.querySelector(".fn").textContent=f; if(!f.endsWith("/")) d.onclick=()=>openPreview(cwd.replace(/\/$/,"")+"/"+f); box.appendChild(d);} }
function setCwd(p){ cwd=p; knownFiles=null; $("folder").textContent=p; refreshFiles(); }

/* ---- markdown ---- */
function mdToHtml(md){
  const lines=md.replace(/\r/g,"").split("\n"); let out=[],i=0;
  const inline=(t)=>esc(t).replace(/`([^`]+)`/g,(_,c)=>"<code>"+c+"</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>").replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  while(i<lines.length){ let l=lines[i];
    if(/^```/.test(l)){const buf=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){buf.push(lines[i]);i++;}i++;out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");continue;}
    let h=l.match(/^(#{1,6})\s+(.*)/); if(h){out.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">");i++;continue;}
    if(/^(\s*[-*]\s+)/.test(l)){const it=[];while(i<lines.length&&/^(\s*[-*]\s+)/.test(lines[i])){it.push("<li>"+inline(lines[i].replace(/^\s*[-*]\s+/,""))+"</li>");i++;}out.push("<ul>"+it.join("")+"</ul>");continue;}
    if(/^\s*\d+\.\s+/.test(l)){const it=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){it.push("<li>"+inline(lines[i].replace(/^\s*\d+\.\s+/,""))+"</li>");i++;}out.push("<ol>"+it.join("")+"</ol>");continue;}
    if(/^\s*(---|\*\*\*)\s*$/.test(l)){out.push("<hr>");i++;continue;}
    if(/^\s*>\s?/.test(l)){const buf=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,""));i++;}out.push("<blockquote>"+inline(buf.join(" "))+"</blockquote>");continue;}
    if(/^\s*\|.*\|\s*$/.test(l)&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1])){const rows=[];while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){rows.push(lines[i]);i++;}const cells=(r)=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());let t="<table><thead><tr>"+cells(rows[0]).map(h=>"<th>"+inline(h)+"</th>").join("")+"</tr></thead><tbody>";for(const r of rows.slice(2))t+="<tr>"+cells(r).map(c=>"<td>"+inline(c)+"</td>").join("")+"</tr>";out.push(t+"</tbody></table>");continue;}
    if(/^\s*$/.test(l)){i++;continue;}
    const para=[l];i++;while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^(#{1,6}\s|```|\s*[-*]\s|\s*\d+\.\s|\s*>|\s*\|)/.test(lines[i])){para.push(lines[i]);i++;}out.push("<p>"+inline(para.join(" "))+"</p>");
  }
  return out.join("\n");
}
function gridTable(rows){ let t='<table class="grid">'; for(const r of rows){ t+="<tr>"+(r||[]).map(c=>"<td>"+esc(String(c))+"</td>").join("")+"</tr>"; } return t+"</table>"; }
function parseCsv(text){ return text.replace(/\r/g,"").split("\n").filter(l=>l.length).map(l=>{const out=[];let cur="",q=false;for(let i=0;i<l.length;i++){const c=l[i];if(q){if(c==='"'&&l[i+1]==='"'){cur+='"';i++;}else if(c==='"')q=false;else cur+=c;}else{if(c==='"')q=true;else if(c===","){out.push(cur);cur="";}else cur+=c;}}out.push(cur);return out;}); }

function fileUrl(p){ return "file://"+p.split("/").map(encodeURIComponent).join("/"); }
function renderMath(el){ try{ if(window.renderMathInElement) window.renderMathInElement(el,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false}); }catch(e){} }
async function openPreview(path){
  const name=path.split("/").pop(), ext=(name.split(".").pop()||"").toLowerCase();
  const pv=$("preview"), body=$("pvbody"); $("pvname").textContent=name; $("pvic").textContent=ICONS[ext]||"◆"; pv.hidden=false;
  body.innerHTML='<div class="pvload"><span class="spin"></span> 로딩…</div>';
  try{
    if(["png","jpg","jpeg","gif","webp","ico","bmp"].includes(ext)){ body.innerHTML='<img class="pv" src="'+fileUrl(path)+'">'; return; }
    if(ext==="pdf"){ body.innerHTML='<iframe src="'+fileUrl(path)+'"></iframe>'; return; }
    if(ext==="html"||ext==="htm"){ body.innerHTML='<iframe src="'+fileUrl(path)+'" sandbox="allow-same-origin"></iframe>'; return; }
    if(ext==="xlsx"||ext==="xls"){ const r=await window.poly.readXlsx(path); if(!r.ok){body.innerHTML='<pre class="raw">'+esc(r.error)+'</pre>';return;} body.innerHTML='<div class="gridwrap">'+r.sheets.map(s=>'<div class="sheetname">📊 '+esc(s.name)+'</div>'+gridTable(s.rows)).join("<br>")+'</div>'; return; }
    const r=await window.poly.readFile(path);
    if(!r.ok){ body.innerHTML='<pre class="raw">'+esc(r.error||"읽기 실패")+'</pre>'; return; }
    if(ext==="svg"){ body.innerHTML='<div class="svgwrap">'+r.content+'</div>'; return; }
    if(ext==="md"||ext==="markdown"){ body.innerHTML='<div class="md">'+mdToHtml(r.content)+'</div>'; renderMath(body.firstChild); return; }
    if(ext==="tex"){ body.innerHTML='<div class="md">'+mdToHtml(r.content)+'</div>'; renderMath(body.firstChild); return; }
    if(ext==="csv"){ body.innerHTML='<div class="gridwrap">'+gridTable(parseCsv(r.content))+'</div>'; return; }
    if(ext==="json"){ let pretty=r.content; try{pretty=JSON.stringify(JSON.parse(r.content),null,2);}catch{} body.innerHTML='<pre class="raw">'+esc(pretty)+'</pre>'; return; }
    body.innerHTML='<pre class="raw">'+esc(r.content)+'</pre>';
  }catch(e){ body.innerHTML='<pre class="raw">'+esc(String(e))+'</pre>'; }
}
$("pvclose").onclick=()=>{ $("preview").hidden=true; };

/* ---- onboarding + run ---- */
$("savekey").onclick=async()=>{const k=$("key").value.trim();if(!k)return;await window.poly.saveKey(k);$("key").value="";assistantStart();status("✓ OpenRouter 키 저장됨","ok");refreshStatus();};
$("pick").onclick=async()=>{const p=await window.poly.pickFolder();if(p)setCwd(p);};
$("local").onclick=()=>{assistantStart();busyOn("로컬 LLM 설치 중 (Ollama + 최적 모델)…");window.poly.setupLocal();};

const ta=$("goal");
ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,170)+"px";});
ta.addEventListener("keydown",(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();run();}});
function run(){ const goal=ta.value.trim(); if(!goal) return;
  if(!cwd){ assistantStart(); status("먼저 작업 폴더를 열어주세요.","err"); return; }
  if(running) return; running=true; $("run").disabled=true; $("title").textContent=goal.slice(0,42);
  userMsg(goal); ta.value=""; ta.style.height="auto"; assistantStart(); busyOn("작업 중…");
  window.poly.runAgent(goal,cwd);
}
$("run").onclick=run;

window.poly.onLog((s)=>{ if(s) tool(s); });
window.poly.onEvent((e)=>{
  switch(e.type){
    case "plan": status("계획 수립 ("+e.plan.steps.length+" 단계) · "+e.planModel,"info"); break;
    case "criteria": status("목표: "+e.goalType+" · 기준 "+e.criteria.length+"개","info"); break;
    case "step-start": status((e.explored?"🎲 ":"")+"단계 "+e.step.id+" ["+e.step.type+"] → "+e.model.id,"step"); break;
    case "tool-call": tool("🔧 "+e.name+"("+(e.args||"").slice(0,90)+")"); break;
    case "tool-result": tool("↳ "+(e.result||"").replace(/\n/g," ").slice(0,140)); break;
    case "question": renderQuestion(e.question, e.options); break;
    case "step-end": status("✓ "+(e.summary||"").slice(0,150),"ok"); refreshFiles(); break;
    case "verdict": status((e.allMet?"✅ ":"❌ ")+e.metCount+"/"+e.total+" 기준 충족",e.allMet?"ok":"err"); break;
    case "quality": status("📊 품질 "+e.overall+"/100"+(e.dims&&e.dims.design!=null?(" · 디자인 "+e.dims.design):""),"info"); break;
    case "done": busyOff(); status("완료 · "+e.calls+" calls"+(e.totalCostUsd!=null?(" · $"+e.totalCostUsd.toFixed(4)):""),"ok"); break;
    case "error": status("⚠ "+e.message,"err"); break;
    case "exit": busyOff(); running=false; $("run").disabled=false; refreshFiles(); if(shotPath) setTimeout(()=>window.poly.capture(shotPath),1200); break;
  }
});
window.poly.onAuto((a)=>{ setCwd(a.cwd); if(a.goal) ta.value=a.goal; shotPath=a.shot||"";
  if(a.preview){ setTimeout(()=>openPreview(a.preview),800); }
  if(a.run && a.goal){ setTimeout(run,600); }
  else if(a.preview){ const nm=a.preview.split("/").pop(); userMsg("이 아티팩트를 미리보기로 렌더해줘: "+nm); assistantStart(); status("아티팩트 렌더 → 오른쪽 미리보기 패널","info"); status("✓ "+nm+" 네이티브 렌더 완료 (SVG·PDF·HTML·Markdown·CSV·JSON·XLSX 지원)","ok"); }
});
refreshStatus();
</script>
</body>
